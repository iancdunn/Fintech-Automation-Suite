name: Fintech Automation Suite
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & Run Tests
        run: docker compose up --build --exit-code-from tests
