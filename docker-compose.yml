version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development

  tests:
    build: 
      context: .
      dockerfile: Dockerfile
    depends_on:
      - web
    environment:
      - BASE_URL=http://web:5000
    volumes:
      - ./Automation_Suite/test-results:/app/Automation_Suite/test-results
